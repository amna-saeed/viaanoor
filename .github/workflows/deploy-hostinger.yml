# Push to `main` → SSH se Hostinger par git pull + Laravel commands
# Pehle server par ek dafa repo clone karke path note karo (niche MD file dekho)
# Repo: https://github.com/amna-saeed/viaanoor

name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest

    steps:
      - name: Run deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          # Hostinger kabhi-kabhi 65002 port deta hai — tab yahan 65002 likho
          port: 22
          script_stop: true
          script: |
            cd ${{ secrets.HOSTINGER_PROJECT_PATH }}
            git fetch origin main
            git reset --hard origin/main
            composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
            php artisan migrate --force --no-interaction
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
